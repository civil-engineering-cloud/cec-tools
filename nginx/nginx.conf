events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 根目录 - 显示渲染后的 README
    location = / {
        try_files /index.html =404;
    }

    # 主安装脚本 - 强制下载
    location = /tools/install.sh {
        alias /usr/share/nginx/html/tools/install.sh;
        default_type application/x-shellscript;
        add_header Content-Disposition 'attachment; filename="install.sh"';
    }

    # Clash 安装脚本 - 强制下载
    location = /clash/install.sh {
        alias /usr/share/nginx/html/clash/install.sh;
        default_type application/x-shellscript;
        add_header Content-Disposition 'attachment; filename="install.sh"';
    }

    # V2Ray 安装脚本 - 强制下载
    location = /v2ray/install.sh {
        alias /usr/share/nginx/html/v2ray/install.sh;
        default_type application/x-shellscript;
        add_header Content-Disposition 'attachment; filename="install.sh"';
    }

    # Clash 目录
    location /clash/ {
        alias /usr/share/nginx/html/clash/;
        autoindex on;
    }

    # V2Ray 目录
    location /v2ray/ {
        alias /usr/share/nginx/html/v2ray/;
        autoindex on;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
}
