events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    charset utf-8;

    server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 根目录 - 显示渲染后的 README
    location = / {
        try_files /index.html =404;
    }

    # 工具目录
    location /tools/ {
        alias /usr/share/nginx/html/;
        autoindex off;

        # 主安装脚本
        location = /tools/install.sh {
            alias /usr/share/nginx/html/tools/install.sh;
            default_type application/x-shellscript;
            add_header Content-Disposition 'attachment; filename="install.sh"';
        }

        # Clash 安装脚本
        location /tools/clash/install.sh {
            alias /usr/share/nginx/html/clash/install.sh;
            default_type application/x-shellscript;
            add_header Content-Disposition 'attachment; filename="install.sh"';
        }

        # V2Ray 安装脚本
        location /tools/v2ray/install.sh {
            alias /usr/share/nginx/html/v2ray/install.sh;
            default_type application/x-shellscript;
            add_header Content-Disposition 'attachment; filename="install.sh"';
        }

        # Clash 二进制文件
        location /tools/clash/bin/ {
            alias /usr/share/nginx/html/clash/bin/;
            autoindex off;
        }

        # V2Ray 二进制文件
        location /tools/v2ray/bin/ {
            alias /usr/share/nginx/html/v2ray/bin/;
            autoindex off;
        }
    }

    # Clash 数据文件
    location /clash/ {
        alias /usr/share/nginx/html/clash/;
        autoindex off;
    }

    # V2Ray 数据文件
    location /v2ray/ {
        alias /usr/share/nginx/html/v2ray/;
        autoindex off;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
}